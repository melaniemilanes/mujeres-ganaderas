<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mujeres Ganaderas de Panama</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
  .landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px 24px;background:#2a3d2e;position:relative}
  .logo-icon{width:160px;height:auto;margin-bottom:32px;opacity:.95}
  .logo-text{font-size:clamp(.85rem,2.2vw,1.1rem);font-weight:500;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:56px}
  .divider{width:48px;height:1px;background:rgba(200,165,100,.35);margin:0 auto 48px;border-radius:2px}
  .tagline{font-family:'Inter',sans-serif;font-size:clamp(1rem,2.8vw,1.35rem);font-style:italic;color:#c8a564;letter-spacing:.03em;line-height:1.5;font-weight:300;margin-bottom:48px}
  .dots{letter-spacing:.2em;color:rgba(200,165,100,.4);font-size:.85rem}
  .btn{display:inline-block;padding:16px 40px;border:1.5px solid rgba(200,165,100,.5);border-radius:999px;color:#c8a564;font-family:'Inter',sans-serif;font-size:.88rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;transition:all .3s ease;background:transparent}
  .btn:hover{background:rgba(200,165,100,.12);border-color:#c8a564;transform:translateY(-1px)}
  .glow{position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(200,165,100,.04);filter:blur(100px);top:25%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
</style>
</head>
<body>
<div class="landing">
  <div class="glow"></div>
  <!-- Logo SVG: cuernos estilizados -->
  <svg class="logo-icon" viewBox="0 0 200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M100 95 C100 95, 85 55, 55 30 C40 18, 25 15, 15 20 C8 24, 5 32, 10 38 C15 44, 30 42, 45 38 C60 34, 80 45, 100 75 C120 45, 140 34, 155 38 C170 42, 185 44, 190 38 C195 32, 192 24, 185 20 C175 15, 160 18, 145 30 C115 55, 100 95, 100 95Z" fill="#c8a564"/>
  </svg>
  <div class="logo-text">Mujeres Ganaderas de Panama</div>
  <div class="divider"></div>
  <div class="tagline">
    Se esta calentando el hierro<span class="dots">&nbsp;. . .</span>
  </div>
  <a href="/registro.html" class="btn">Hola Socia Fundadora — Registrate</a>
</div>
</body>
</html>
