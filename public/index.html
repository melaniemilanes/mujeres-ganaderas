<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mujeres Ganaderas de Panama</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
  .landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px 24px;background:#1e3a2a;position:relative}
  .logo-icon{width:140px;height:auto;margin-bottom:40px}
  .logo-text{font-size:clamp(.75rem,1.8vw,.92rem);font-weight:400;letter-spacing:.4em;text-transform:uppercase;color:rgba(200,165,100,.55);margin-bottom:60px}
  .divider{width:40px;height:1px;background:rgba(200,165,100,.3);margin:0 auto 44px}
  .tagline{font-size:clamp(1rem,2.6vw,1.3rem);font-style:italic;color:#c8a564;letter-spacing:.03em;line-height:1.5;font-weight:300;margin-bottom:52px}
  .dots{letter-spacing:.2em;color:rgba(200,165,100,.35);font-size:.85rem}
  .btn{display:inline-block;padding:15px 36px;border:1px solid rgba(200,165,100,.4);border-radius:999px;color:#c8a564;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;transition:all .3s ease;background:transparent}
  .btn:hover{background:rgba(200,165,100,.1);border-color:rgba(200,165,100,.7)}
  .glow{position:absolute;width:350px;height:350px;border-radius:50%;background:rgba(200,165,100,.03);filter:blur(80px);top:28%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
</style>
</head>
<body>
<div class="landing">
  <div class="glow"></div>
  <svg class="logo-icon" viewBox="0 0 200 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Left horn: S-curve from center-bottom, sweeping up-left, tip curls outward-left -->
    <path d="
      M100 145
      C99 140, 98 130, 96 120
      C92 105, 86 90, 78 78
      C70 66, 60 56, 50 48
      C40 40, 30 35, 22 32
      C16 30, 12 30, 10 33
      C8 36, 10 40, 16 42
      C22 44, 32 44, 42 46
      C55 49, 68 56, 80 68
      C88 76, 94 88, 97 105
      C99 115, 100 130, 100 145
      Z" fill="#c8a564"/>
    <!-- Right horn: mirror -->
    <path d="
      M100 145
      C101 140, 102 130, 104 120
      C108 105, 114 90, 122 78
      C130 66, 140 56, 150 48
      C160 40, 170 35, 178 32
      C184 30, 188 30, 190 33
      C192 36, 190 40, 184 42
      C178 44, 168 44, 158 46
      C145 49, 132 56, 120 68
      C112 76, 106 88, 103 105
      C101 115, 100 130, 100 145
      Z" fill="#c8a564"/>
  </svg>
  <div class="logo-text">Mujeres Ganaderas de Panama</div>
  <div class="divider"></div>
  <div class="tagline">Se esta calentando el hierro<span class="dots">&nbsp;. . .</span></div>
  <a href="/registro.html" class="btn">Hola Socia Fundadora — Registrate</a>
</div>
</body>
</html>
