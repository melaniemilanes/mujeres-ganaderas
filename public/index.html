<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mujeres Ganaderas Panama</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#1a1714;color:#fff;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
  .landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px 24px;position:relative}
  .landing::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(92,58,30,.18) 0%,transparent 70%)}
  .logo-container{position:relative;z-index:1;margin-bottom:48px}
  .logo-text{font-family:'Playfair Display',Georgia,serif;font-weight:700;font-size:clamp(2.4rem,6vw,4rem);letter-spacing:-.02em;line-height:1.1;color:#fff}
  .logo-sub{font-size:clamp(1rem,2.5vw,1.4rem);font-weight:300;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:8px}
  .divider{width:48px;height:2px;background:#b8893e;margin:0 auto 48px;border-radius:2px;position:relative;z-index:1}
  .tagline{position:relative;z-index:1;font-family:'Playfair Display',Georgia,serif;font-size:clamp(1.1rem,3vw,1.6rem);font-style:italic;color:#b8893e;letter-spacing:.02em;line-height:1.5}
  .dots{margin-top:6px;letter-spacing:.15em;color:rgba(184,137,62,.5);font-size:.9rem}
  .glow{position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(184,137,62,.04);filter:blur(80px);top:30%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
</style>
</head>
<body>
<div class="landing">
  <div class="glow"></div>
  <div class="logo-container">
    <div class="logo-text">Mujeres Ganaderas</div>
    <div class="logo-sub">Panama</div>
  </div>
  <div class="divider"></div>
  <div class="tagline">
    Se esta calentando el hierro<span class="dots">&nbsp;. . .</span>
  </div>
</div>
</body>
</html>
