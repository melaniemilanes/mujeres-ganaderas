<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mujeres Ganaderas de Panama</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
  .landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px 24px;background:#2a3d2e;position:relative}
  .logo-icon{width:140px;height:auto;margin-bottom:36px}
  .logo-text{font-size:clamp(.8rem,2vw,1rem);font-weight:500;letter-spacing:.35em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:56px}
  .divider{width:48px;height:1px;background:rgba(200,165,100,.35);margin:0 auto 48px}
  .tagline{font-size:clamp(1rem,2.8vw,1.35rem);font-style:italic;color:#c8a564;letter-spacing:.03em;line-height:1.5;font-weight:300;margin-bottom:48px}
  .dots{letter-spacing:.2em;color:rgba(200,165,100,.4);font-size:.85rem}
  .btn{display:inline-block;padding:16px 40px;border:1.5px solid rgba(200,165,100,.5);border-radius:999px;color:#c8a564;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;transition:all .3s ease;background:transparent}
  .btn:hover{background:rgba(200,165,100,.12);border-color:#c8a564;transform:translateY(-1px)}
  .glow{position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(200,165,100,.04);filter:blur(100px);top:25%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
</style>
</head>
<body>
<div class="landing">
  <div class="glow"></div>
  <svg class="logo-icon" viewBox="0 0 200 130" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M100 120 C98 95, 88 70, 68 48 C52 30, 32 18, 15 12 C8 9, 3 12, 4 18 C5 24, 14 28, 28 30 C45 33, 65 42, 82 60 C92 72, 97 88, 100 110 C103 88, 108 72, 118 60 C135 42, 155 33, 172 30 C186 28, 195 24, 196 18 C197 12, 192 9, 185 12 C168 18, 148 30, 132 48 C112 70, 102 95, 100 120Z" fill="#c8a564"/>
  </svg>
  <div class="logo-text">Mujeres Ganaderas de Panama</div>
  <div class="divider"></div>
  <div class="tagline">Se esta calentando el hierro<span class="dots">&nbsp;. . .</span></div>
  <a href="/registro.html" class="btn">Hola Socia Fundadora — Registrate</a>
</div>
</body>
</html>
